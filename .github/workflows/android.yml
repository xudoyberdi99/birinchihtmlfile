name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. Kodni olish
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java 17 o'rnatish
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Android SDK litsenziyalarini qabul qilish
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # 4. Gradle keshini saqlash (keyingi build tezroq bo'ladi)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. gradlew ga ishga tushirish huquqi berish
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Debug APK yasash
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. APK ni artifact sifatida yuklash
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AIYordamchi-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
