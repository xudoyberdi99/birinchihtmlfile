name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Gradle 8.2.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2.1-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.2.1-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.2.1/bin" >> $GITHUB_PATH

      - name: Show repo structure
        run: find . -name "settings.gradle" -o -name "build.gradle" | sort

      - name: Find project root and build APK
        run: |
          SETTINGS=$(find . -name "settings.gradle" -maxdepth 4 | head -1)
          if [ -z "$SETTINGS" ]; then
            echo "XATO: settings.gradle topilmadi!"
            ls -la
            exit 1
          fi
          PROJECT_DIR=$(dirname "$SETTINGS")
          echo "Loyiha joyi: $PROJECT_DIR"
          gradle -p "$PROJECT_DIR" assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AIYordamchi-APK
          path: '**/outputs/apk/debug/*.apk'
          retention-days: 7
